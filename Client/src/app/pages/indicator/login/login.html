<div class="container">
    <div class="card">
        <div class="header">
            <div class="logo" routerLink="/">
                <div class="logo-icon"></div>
                <span>SplitPay</span>
            </div>
            <div class="stepper">
                <span class="step active"></span>
                <span class="step"></span>
                <span class="step"></span>
            </div>
        </div>

        <h1>Login Account</h1>
        <p class="subtitle">Enter your details or sign in via social networks</p>

        <div class="social">
            <button class="social-btn google-btn">
                <img src="media/Google.jpg" alt="Google Logo" class="social-logo">
                Continue with Google
            </button>
        </div>

        <div class="divider">
            <span>or via email</span>
        </div>

        <form class="form">
            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="Bob@email.com" [(ngModel)]="email" name="email">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="Min. 8 characters" [(ngModel)]="password" name="password">
            </div>

            <div class="checkbox-container">
                <label class="custom-checkbox">
                    <input
                        type="checkbox"
                        [(ngModel)]="acceptTerms"
                        name="acceptTerms">
                    <span class="checkmark"></span>
                    <span class="label-text">
                        I agree to the <span class="link">Terms of Service</span> and <span class="link">Privacy
                            Policy</span>
                    </span>
                </label>
            </div>
            <div *ngIf="Error" class="error-message">
                {{ Error }}
            </div>
            <button type="button" (click)="onLogin($event)" class="submit-btn">Log In</button>

        </form>

        <p class="footer-text">Already have an account?<a class="link" routerLink="/register"> <span> Register</span></a></p>
    </div>
</div>
