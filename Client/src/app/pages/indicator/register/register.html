<div class="auth-container">
    <div class="auth-card">
        <header class="auth-header">
            <div class="logo" routerLink="/">
                <div class="logo-icon"></div>
                <span>SplitPay</span>
            </div>
            <div class="stepper">
                <span class="step active"></span>
                <span class="step"></span>
                <span class="step"></span>
            </div>
        </header>

        <h1>Create Account</h1>
        <p class="subtitle">Enter your details or sign up via social networks</p>

        <div class="social-auth">
            <button class="social-btn google-btn">
                <img src="media/Google.jpg" alt="Google Logo" class="social-logo">
                Continue with Google
            </button>
        </div>

        <div class="divider">
            <span>or via email</span>
        </div>

        <form class="register-form">
            <div class="form-row">
                <div class="input-group">
                    <label>First Name</label>
                    <input type="text" placeholder="Bob" [(ngModel)]="firstName" name="firstName">
                </div>
                <div class="input-group">
                    <label>Last Name</label>
                    <input type="text" placeholder="Bobbyson" [(ngModel)]="lastName" name="lastName">
                </div>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="Bob@email.com" [(ngModel)]="email" name="email">
            </div>

            <div class="input-group">
                <label>Password</label>
                
                <input type="password" placeholder="Min. 8 characters" [(ngModel)]="password" name="password">
            </div>

            <div class="input-group">
                <label>password confirmation</label>
                <input type="password" placeholder="Min. 8 characters" [(ngModel)]="password2" name="password2">
            </div>

            <div class="checkbox-container">
                <label class="custom-checkbox">
                    <input
                        type="checkbox"
                        [(ngModel)]="acceptTerms"
                        name="acceptTerms">
                    <span class="checkmark"></span>
                    <span class="label-text">
                        I agree to the <span class="link">Terms of Service</span> and <span class="link">Privacy
                            Policy</span>
                    </span>
                </label>
            </div>

            <div *ngIf="Error" class="error-message">
            {{ Error }}
            </div>
            <button type="button" (click)="onRegister($event)" class="submit-btn">Register</button>

        </form>

        <p class="footer-text">Already have an account?<a class="link" routerLink="/login"> <span> Log In</span></a></p>
    </div>
</div>
