<div class="auth-container">
    <div class="auth-card">
        <header class="auth-header">
            <div class="logo" routerLink="/">
                <div class="logo-icon"></div>
                <span>SplitPay</span>
            </div>
            <div class="stepper">
                <span class="step active"></span>
                <span class="step"></span>
                <span class="step"></span>
            </div>
        </header>

        <h1>Create Account</h1>
        <p class="subtitle">Enter your details or sign up via social networks</p>

        <div class="social-auth">
            <button class="social-btn google-btn">
                <img src="media/Google.jpg" alt="Google Logo" class="social-logo">
                Continue with Google
            </button>
        </div>

        <div class="divider">
            <span>or via email</span>
        </div>

        <form class="register-form">
            <div class="form-row">
                <div class="input-group">
                    <label>First Name</label>
                    <input type="text" placeholder="Bob">
                </div>
                <div class="input-group">
                    <label>Last Name</label>
                    <input type="text" placeholder="Bobbyson">
                </div>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="Bob@email.com">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="Min. 8 characters">
            </div>

            <div class="checkbox-container">
                <label class="custom-checkbox">
                    <input type="checkbox" id="terms">
                    <span class="checkmark"></span>
                    <span class="label-text">
                        I agree to the <span class="link">Terms of Service</span> and <span class="link">Privacy
                            Policy</span>
                    </span>
                </label>
            </div>

            <button type="button" (click)="onRegister($event)" class="submit-btn">Register</button>

        </form>

        <p class="footer-text">Already have an account? <span class="link">Log In</span></p>
    </div>
</div>
